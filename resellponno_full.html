<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ResellPonno Bangladesh</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- React & Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        /* Custom scrollbar for better feel */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Fix for Lucide Icons in CDN */
        .lucide-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Ensure animations are smooth */
        .framer-motion-container {
            width: 100%;
        }

        #loader {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="flex flex-col items-center">
            <div class="w-16 h-16 border-4 border-[#00a859] border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-6 text-[#00a859] font-black text-lg tracking-widest animate-pulse uppercase">ResellPonno</p>
        </div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, cloneElement, createElement, useRef } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // --- Icon Component Helper ---
        const Icon = ({ name, className = "w-6 h-6", size = 24, strokeWidth = 2 }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        attrs: {
                            class: className,
                            'stroke-width': strokeWidth,
                            width: size,
                            height: size
                        },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, className, size, strokeWidth]);

            return (
                <span className="lucide-icon">
                    <i data-lucide={name} ref={iconRef}></i>
                </span>
            );
        };

        // --- Reusable Components ---

        const NavItem = ({ active, icon, label, onClick }) => (
            <button 
                onClick={onClick}
                className={`flex flex-col items-center gap-1 min-w-[70px] relative transition-colors ${active ? 'text-[#00a859]' : 'text-gray-400'}`}
            >
                <div className={`p-1.5 rounded-2xl transition-all duration-300 ${active ? 'bg-green-100' : ''}`}>
                    {cloneElement(icon, { name: icon.props.name, size: 24, strokeWidth: 2.5 })}
                </div>
                <span className={`text-[9px] ${active ? 'font-black' : 'font-bold'}`}>{label}</span>
                {active && <motion.div layoutId="nav-pill" className="absolute -top-2 w-8 h-1 bg-[#00a859] rounded-full" />}
            </button>
        );

        const GridItem = ({ icon, label, onClick }) => (
            <motion.div 
                whileTap={{ scale: 0.95 }}
                onClick={onClick}
                className="flex flex-col items-center justify-center gap-2.5 group cursor-pointer"
            >
                <div className="w-[66px] h-[66px] bg-white rounded-2xl shadow-lg shadow-gray-200/50 border border-gray-50 flex items-center justify-center p-4 group-hover:shadow-[#00a859]/20 group-hover:-translate-y-1 transition-all duration-300 relative overflow-hidden">
                    <div className="absolute inset-0 bg-gradient-to-br from-white to-gray-50 opacity-50" />
                    <div className="w-full h-full relative z-10 flex items-center justify-center">
                        {cloneElement(icon, { size: 32, className: "w-full h-full" })}
                    </div>
                </div>
                <span className="text-[10px] font-black text-gray-700 text-center leading-[1.1] tracking-tight px-0.5 max-w-[70px]">
                    {label}
                </span>
            </motion.div>
        );

        const SocialIcon = ({ bg, icon }) => (
            <motion.a 
                href="#" 
                whileHover={{ y: -5 }}
                whileTap={{ scale: 0.9 }}
                className={`p-3 ${bg} rounded-2xl text-white shadow-lg shadow-current/10 transition-transform`}
            >
                {icon}
            </motion.a>
        );

        const WalletListOption = ({ icon, label }) => (
            <div className="bg-white p-4 rounded-2xl flex items-center justify-between border border-gray-50 shadow-sm active:bg-gray-50 transition-colors cursor-pointer">
                <div className="flex items-center gap-4">
                    <div className="w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center border border-gray-100">
                        {cloneElement(icon, { size: 20 })}
                    </div>
                    <span className="text-xs font-bold text-gray-700">{label}</span>
                </div>
                <Icon name="chevron-right" size={16} className="text-gray-300" />
            </div>
        );

        const WalletMenuItem = ({ icon, label, color }) => (
            <button className="w-full flex items-center justify-between p-4 bg-white rounded-2xl border border-gray-100 shadow-sm active:scale-[0.98] transition-transform">
                <div className="flex items-center gap-4">
                    <div className={`${color} bg-gray-50 p-2.5 rounded-xl flex items-center justify-center`}>
                        {createElement(Icon, { name: icon, size: 20 })}
                    </div>
                    <span className="text-sm font-bold text-gray-700">{label}</span>
                </div>
                <Icon name="chevron-right" size={20} className="text-gray-300" />
            </button>
        );

        // --- Sidebar Component ---
        const Sidebar = ({ onClose, onNavigate }) => {
            const menuItems = [
                { icon: 'home', label: 'হোম', screen: 'home' },
                { icon: 'user', label: 'আমার প্রোফাইল', screen: 'profile' },
                { icon: 'wallet', label: 'আমার ওয়ালেট', screen: 'wallet' },
                { icon: 'users', label: 'আমার রেফারি', screen: 'refer' },
                { icon: 'shopping-cart', label: 'আমার অর্ডার', screen: 'coming-soon' },
                { icon: 'list', label: 'সকল প্রোডাক্ট গ্রূপ', screen: 'categories' },
                { icon: 'help-circle', label: 'লাইভ সাপোর্ট', screen: 'coming-soon' },
            ];

            return (
                <div className="flex flex-col h-full bg-[#f8f9fa]">
                    <div className="p-6 bg-white border-b border-gray-100 flex flex-col items-center relative shadow-sm">
                        <button onClick={onClose} className="absolute top-4 right-4 p-2 rounded-xl bg-gray-50 text-gray-400 hover:text-red-500 transition-colors">
                            <Icon name="x" size={20} />
                        </button>
                        
                        <div className="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center p-1 border-4 border-white shadow-xl mb-4 relative group">
                            <div className="w-full h-full bg-white rounded-full flex items-center justify-center overflow-hidden">
                                <Icon name="user" size={40} className="text-gray-300" />
                            </div>
                            <div className="absolute bottom-0 right-1 w-5 h-5 bg-[#00a859] border-2 border-white rounded-full" />
                        </div>

                        <h3 className="font-black text-gray-800 text-lg mb-1 uppercase">Md Zahid Hasan</h3>
                        <div className="bg-[#00a859] text-white text-[9px] font-black px-4 py-1.5 rounded-full mb-4 shadow-lg shadow-[#00a859]/20 flex items-center gap-1.5">
                            <span className="w-1.5 h-1.5 bg-white rounded-full animate-pulse" />
                            RESELLER ACCOUNT
                        </div>

                        <div className="bg-gray-50 rounded-xl px-5 py-2.5 flex flex-col items-center gap-1 w-full border border-gray-100 shadow-inner">
                            <span className="text-[10px] text-gray-400 font-bold uppercase tracking-widest leading-none">এফিলিয়েট আইডি</span>
                            <span className="text-sm font-black text-[#00a859] border-b-2 border-[#00a859]/20">RPB100</span>
                        </div>
                    </div>

                    <nav className="flex-1 overflow-y-auto p-4 space-y-1 no-scrollbar">
                        {menuItems.map((item, idx) => (
                            <button 
                                key={idx}
                                onClick={() => { onNavigate(item.screen); onClose(); }}
                                className="w-full flex items-center justify-between p-4 rounded-2xl hover:bg-white hover:shadow-md hover:shadow-gray-100 transition-all group border border-transparent hover:border-gray-50"
                            >
                                <div className="flex items-center gap-4">
                                    <div className="w-10 h-10 bg-white rounded-xl shadow-sm border border-gray-50 flex items-center justify-center text-gray-400 group-hover:text-[#00a859] group-hover:scale-110 transition-all">
                                        <Icon name={item.icon} size={20} />
                                    </div>
                                    <span className="text-[11px] font-bold text-gray-600 group-hover:text-gray-900 leading-none">{item.label}</span>
                                </div>
                                <Icon name="chevron-right" size={16} className="text-gray-300 group-hover:text-[#00a859] group-hover:translate-x-1 transition-all" />
                            </button>
                        ))}
                    </nav>

                    <div className="p-6">
                        <button className="w-full py-4 bg-red-50 text-red-500 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] shadow-sm border border-red-100 active:scale-95 transition-transform flex items-center justify-center gap-2">
                           লগ-আউট করুন
                        </button>
                    </div>
                </div>
            );
        };

        // --- Screen Components ---

        const HomeScreen = ({ onNavigate }) => (
            <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="space-y-4">
                <section className="px-4 pt-4">
                    <div className="relative aspect-[21/10] rounded-2xl overflow-hidden shadow-sm bg-[#00a859]">
                        <div className="absolute inset-0 bg-gradient-to-br from-[#00a859] to-[#008f4c] flex flex-col justify-center px-6">
                            <h2 className="text-white font-bold text-[10px] mb-1 opacity-95 flex items-center gap-1">
                                <div className="w-4 h-4 bg-white/20 rounded-full flex items-center justify-center">
                                    <div className="w-1.5 h-1.5 bg-white rounded-full" />
                                </div>
                                এক অ্যাপেই সব কিছু এক জায়গায়
                            </h2>
                            <p className="text-white font-black text-2xl leading-[1.1] mb-2 tracking-tighter italic">RESELLPONNO <br/> <span className="text-yellow-300 not-italic">BANGLADESH</span></p>
                            <div className="bg-white/10 backdrop-blur-md rounded-lg py-1.5 px-4 w-fit border border-white/20 text-[10px] text-white font-bold flex items-center gap-2">
                                <Icon name="rocket" size={12} className="text-yellow-300" />
                                আপনাকে স্বাগতম
                            </div>
                        </div>
                        <div className="absolute -right-10 -bottom-10 w-40 h-40 bg-white/10 rounded-full blur-3xl animate-pulse" />
                    </div>
                </section>

                <section className="px-4">
                    <div className="bg-[#1e40af] text-white rounded-xl py-3 px-4 shadow-lg flex items-center gap-3 overflow-hidden">
                        <div className="flex-shrink-0 animate-pulse bg-yellow-400/20 p-1.5 rounded-full">
                            <Icon name="bell" size={20} className="text-yellow-400" />
                        </div>
                        <div className="text-[11px] font-medium flex-1 overflow-hidden relative">
                            <motion.p animate={{ x: [300, -800] }} transition={{ duration: 20, repeat: Infinity, ease: 'linear' }} className="whitespace-nowrap">
                                📢 গুরুত্বপূর্ণ নোটিশ: ঈদ-উল-ফিতর ছুটির ঘোষণা 🌙 রিসেল পণ্য প্রতিষ্ঠান এর সকল সম্মানিত গ্রাহক... বিস্তারিত দেখুন
                            </motion.p>
                        </div>
                    </div>
                </section>

                <section className="px-4">
                    <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
                        <h3 className="text-center text-xs font-semibold text-gray-400 mb-4 uppercase tracking-[0.2em]">সোশ্যাল লিঙ্ক</h3>
                        <div className="flex justify-around items-center">
                            <SocialIcon bg="bg-blue-600" icon={<Icon name="facebook" className="fill-white" />} />
                            <SocialIcon bg="bg-red-600" icon={<Icon name="youtube" className="fill-white" />} />
                            <SocialIcon bg="bg-green-500" icon={<Icon name="message-circle" className="fill-white" />} />
                            <SocialIcon bg="bg-blue-400" icon={<Icon name="send" className="fill-white" />} />
                        </div>
                    </div>
                </section>

                <section className="px-4 grid grid-cols-4 gap-y-8 gap-x-2 pb-10">
                    <GridItem icon={<Icon name="rocket" className="text-blue-600" />} label="রিসেলিং প্রজেক্ট" onClick={() => onNavigate('coming-soon')} />
                    <GridItem icon={<Icon name="search" className="text-green-600" />} label="প্রোডাক্ট সার্চ" onClick={() => onNavigate('coming-soon')} />
                    <GridItem icon={<Icon name="shield-check" className="text-teal-500" />} label="রিসেলিং প্রো" onClick={() => onNavigate('coming-soon')} />
                    <GridItem icon={<Icon name="shopping-cart" className="text-orange-500" />} label="ই-কমার্স" onClick={() => onNavigate('coming-soon')} />
                    
                    <GridItem icon={<Icon name="bar-chart-3" className="text-indigo-600" />} label="পেন্ডিং রেভিনিউ" onClick={() => onNavigate('coming-soon')} />
                    <GridItem onClick={() => onNavigate('products')} icon={<Icon name="star" className="text-yellow-500" />} label="ভেরিফাইড প্রোডাক্ট" />
                    <GridItem icon={<Icon name="phone" className="text-blue-500" />} label="মোবাইল রিচার্জ" onClick={() => onNavigate('coming-soon')} />
                    <GridItem onClick={() => onNavigate('refer')} icon={<Icon name="users" className="text-emerald-500" />} label="লিডারশিপ" />
                    
                    <GridItem icon={<Icon name="help-circle" className="text-pink-500" />} label="সাপোর্ট" onClick={() => onNavigate('coming-soon')} />
                    <GridItem onClick={() => onNavigate('refer')} icon={<Icon name="trending-up" className="text-rose-500" />} label="রেফার রিপোর্ট" />
                    <GridItem onClick={() => onNavigate('wallet')} icon={<Icon name="wallet" className="text-green-600" />} label="নতুন প্রফিট" />
                    <GridItem onClick={() => onNavigate('wallet')} icon={<Icon name="layout-grid" className="text-blue-500" />} label="ওয়ালেট" />
                    
                    <GridItem icon={<Icon name="heart" className="text-red-500" />} label="ফেভারিট প্রডাক্ট" onClick={() => onNavigate('coming-soon')} />
                    <GridItem icon={<Icon name="list" className="text-indigo-600" />} label="অর্ডার লিস্ট" onClick={() => onNavigate('coming-soon')} />
                    <GridItem onClick={() => onNavigate('wallet')} icon={<Icon name="share-2" className="text-orange-600" />} label="উত্তোলন" />
                    <GridItem onClick={() => onNavigate('wallet')} icon={<Icon name="settings" className="text-gray-500" />} label="ব্যালেন্স এড" />
                </section>
            </motion.div>
        );

        const WalletScreen = ({ onBack }) => (
            <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="min-h-screen bg-[#f3f4f6]">
                <header className="p-4 bg-[#00a859] text-white flex items-center justify-between sticky top-0 z-50">
                    <div className="flex items-center gap-3">
                        <button onClick={onBack} className="p-1 hover:bg-white/10 rounded-full transition-colors">
                            <Icon name="arrow-left" size={24} />
                        </button>
                        <div className="bg-white/20 p-1.5 rounded-lg border border-white/20 flex items-center justify-center">
                            <Icon name="wallet" size={20} className="text-white" />
                        </div>
                        <h2 className="text-sm font-black tracking-tight leading-none uppercase">ওয়ালেট দেখুন</h2>
                    </div>
                    <button className="bg-white/10 px-4 py-1.5 rounded-full text-[10px] font-bold border border-white/20 uppercase tracking-widest">ব্যালেন্স দেখুন</button>
                </header>

                <div className="p-4 space-y-6">
                    <div className="relative overflow-hidden aspect-[21/9] bg-gradient-to-br from-[#1e40af] to-[#3b82f6] rounded-3xl p-8 text-white shadow-xl flex flex-col justify-center items-center">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-16 -mt-16 blur-2xl" />
                        <div className="absolute bottom-0 left-0 w-24 h-24 bg-black/10 rounded-full -ml-12 -mb-12 blur-xl" />
                        <p className="text-white/80 text-[10px] font-bold uppercase tracking-[0.2em] mb-2 leading-none">বর্তমান ব্যালেন্স</p>
                        <span className="text-3xl font-black leading-none">৳ ০.০০</span>
                    </div>

                    <div className="space-y-3">
                        <WalletListOption icon={<Icon name="trending-up" className="text-amber-500" />} label="ইনকাম হিস্ট্রি দেখুন" />
                        <WalletListOption icon={<Icon name="settings" className="text-cyan-500" />} label="ব্যালেন্স এড করুন" />
                        <WalletListOption icon={<Icon name="list" className="text-green-500" />} label="ব্যালেন্স এড হিস্ট্রি" />
                        <WalletListOption icon={<Icon name="wallet" className="text-rose-500" />} label="পেমেন্ট মেথড এড করুন" />
                        <WalletListOption icon={<Icon name="download" className="text-blue-500" />} label="ব্যালেন্স উত্তোলন করুন" />
                        <WalletListOption icon={<Icon name="award" className="text-yellow-600" />} label="ইনকাম স্টেটম্যান্ট" />
                    </div>
                </div>
            </motion.div>
        );

        const ProductsScreen = ({ onBack }) => {
            const products = [
                { id: 1, name: "Threepice Dress Exclusive Collection", price: 460, image: "https://images.unsplash.com/photo-1594938298603-c8148c4dae35?auto=format&fit=crop&w=300&q=80" },
                { id: 2, name: "Mini Portable Air Cooler Fan", price: 1000, image: "https://images.unsplash.com/photo-1591341731326-880629759714?auto=format&fit=crop&w=300&q=80" },
                { id: 3, name: "Wireless Bluetooth Earbuds Pro", price: 670, image: "https://images.unsplash.com/photo-1590658268037-6bf12165a8df?auto=format&fit=crop&w=300&q=80" },
                { id: 4, name: "Rechargeable Hair Trimmer", price: 370, image: "https://images.unsplash.com/photo-1503951914875-452162b0f3f1?auto=format&fit=crop&w=300&q=80" },
                { id: 5, name: "Cotton Casual Mens Shirt", price: 450, image: "https://images.unsplash.com/photo-1596755094514-f87e34085b2c?auto=format&fit=crop&w=300&q=80" },
                { id: 6, name: "Womens Traditional Party Dress", price: 650, image: "https://images.unsplash.com/photo-1515243061678-14fc14c000af?auto=format&fit=crop&w=300&q=80" },
            ];

            return (
                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="bg-[#f0f2f5] min-h-screen">
                    <div className="bg-[#00a859] p-4 flex items-center justify-between sticky top-0 z-50 shadow-md">
                        <div className="flex items-center gap-3">
                            <button onClick={onBack} className="p-1.5 bg-white/20 rounded-lg hover:bg-white/30 transition-colors">
                                <Icon name="arrow-left" size={20} className="text-white" />
                            </button>
                            <span className="text-white font-black text-sm tracking-tight uppercase">ভেরিফাইড প্রোডাক্ট</span>
                        </div>
                        <div className="text-[9px] text-white/90 bg-black/20 px-3 py-1.5 rounded-full font-bold border border-white/5 uppercase tracking-widest leading-none">মোট পণ্য: ৬৬৩ টি</div>
                    </div>

                    <div className="p-3 grid grid-cols-2 gap-3 pb-24">
                        {products.map(p => (
                            <div key={p.id} className="bg-white rounded-2xl overflow-hidden shadow-lg border border-gray-100 flex flex-col active:scale-[0.98] transition-transform">
                                <div className="relative aspect-square">
                                    <img src={p.image} alt={p.name} className="w-full h-full object-cover" />
                                    <div className="absolute top-2 left-2 flex gap-1.5">
                                        <button className="bg-[#00a859] p-2 rounded-xl text-white shadow-xl shadow-[#00a859]/20">
                                            <Icon name="download" size={14} strokeWidth={3} />
                                        </button>
                                    </div>
                                    <div className="absolute top-2 right-2">
                                        <button className="bg-white p-2 rounded-xl text-rose-500 shadow-xl shadow-black/5">
                                            <Icon name="heart" size={14} strokeWidth={3} />
                                        </button>
                                    </div>
                                </div>
                                <div className="p-3 flex-1 flex flex-col justify-between">
                                    <h4 className="text-[10px] font-bold text-gray-700 line-clamp-2 mb-3 leading-snug">{p.name}</h4>
                                    <button className="w-full bg-[#00a859] text-white text-center font-black text-[10px] py-2 rounded-xl shadow-lg shadow-[#00a859]/20 uppercase tracking-wider">
                                        মূল্য: {p.price} টাকা
                                    </button>
                                </div>
                            </div>
                        ))}

        const ReferralScreen = ({ onBack }) => (
            <motion.div initial={{ opacity: 0, x: -20 }} animate={{ opacity: 1, x: 0 }} className="min-h-screen bg-[#f3f4f6]">
