<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ResellPonno Bangladesh</title>
    
    <!-- External Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        #splash-screen {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(0, 168, 89, 0.1);
            border-top: 5px solid #00a859;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .active-tab {
            color: #00a859 !important;
        }
    </style>
</head>
<body>

    <!-- Splash/Loading Screen -->
    <div id="splash-screen">
        <div class="spinner"></div>
        <h1 class="mt-6 text-[#00a859] font-black text-2xl tracking-[0.2em] uppercase">RESELLPONNO</h1>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // --- Icon Component ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- Main App ---
        function App() {
            const [activeScreen, setActiveScreen] = useState('home');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);

            useEffect(() => {
                const splash = document.getElementById('splash-screen');
                setTimeout(() => {
                    if (splash) {
                        splash.style.opacity = '0';
                        setTimeout(() => splash.remove(), 500);
                    }
                }, 1500);
            }, []);

            const renderScreen = () => {
                switch(activeScreen) {
                    case 'wallet': return <WalletScreen onBack={() => setActiveScreen('home')} />;
                    case 'products': return <ProductsScreen onBack={() => setActiveScreen('home')} />;
                    case 'refer': return <ReferralScreen onBack={() => setActiveScreen('home')} />;
                    case 'profile': return <ProfileScreen onBack={() => setActiveScreen('home')} />;
                    case 'coming-soon': return <ComingSoonScreen onBack={() => setActiveScreen('home')} />;
                    default: return <HomeScreen onNavigate={setActiveScreen} />;
                }
            };

            return (
                <div class="min-h-screen max-w-md mx-auto bg-white relative flex flex-col pb-20 shadow-xl border-x border-gray-100">
                    
                    {/* Header */}
                    <header class="bg-[#00a859] text-white p-4 flex items-center justify-between sticky top-0 z-50">
                        <div class="flex items-center gap-3">
                            <button onClick={() => setIsSidebarOpen(true)} class="p-1">
                                <Icon name="menu" />
                            </button>
                            <div class="flex items-center gap-2">
                                <div class="bg-white p-1 rounded">
                                    <Icon name="shopping-cart" size={18} className="text-[#00a859]" />
                                </div>
                                <div>
                                    <h1 class="text-xs font-black leading-none uppercase">ResellPonno</h1>
                                    <p class="text-[7px] text-yellow-300 font-bold uppercase tracking-widest mt-1">Bangladesh</p>
                                </div>
                            </div>
                        </div>
                        <button onClick={() => setActiveScreen('wallet')} class="bg-white/20 text-[10px] font-black px-4 py-1.5 rounded-full border border-white/30 uppercase">
                            ব্যালেন্স দেখুন
                        </button>
                    </header>

                    {/* Sidebar Drawer */}
                    <AnimatePresence>
                        {isSidebarOpen && (
                            <>
                                <motion.div 
                                    initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                                    onClick={() => setIsSidebarOpen(false)}
                                    class="fixed inset-0 bg-black/60 z-[60] max-w-md mx-auto"
                                />
                                <motion.div 
                                    initial={{ x: '-100%' }} animate={{ x: 0 }} exit={{ x: '-100%' }}
                                    class="fixed top-0 left-0 bottom-0 w-[280px] bg-white z-[70] p-6 flex flex-col"
                                >
                                    <div class="flex flex-col items-center mb-8">
                                        <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mb-4 border-4 border-gray-50 shadow-md">
                                            <Icon name="user" size={40} className="text-gray-300" />
                                        </div>
                                        <h3 class="font-black text-gray-800">Md Zahid Hasan</h3>
                                        <p class="text-xs text-gray-400 font-bold">RPB100</p>
                                    </div>
                                    <nav class="space-y-2 flex-1">
                                        <div onClick={() => {setActiveScreen('home'); setIsSidebarOpen(false)}} class="flex items-center gap-4 p-4 rounded-xl hover:bg-gray-50 cursor-pointer">
                                            <Icon name="home" size={20} className="text-gray-400" />
                                            <span class="text-sm font-bold text-gray-600">হোম</span>
                                        </div>
                                        <div onClick={() => {setActiveScreen('profile'); setIsSidebarOpen(false)}} class="flex items-center gap-4 p-4 rounded-xl hover:bg-gray-50 cursor-pointer">
                                            <Icon name="user" size={20} className="text-gray-400" />
                                            <span class="text-sm font-bold text-gray-600">আমার প্রোফাইল</span>
                                        </div>
                                        <div onClick={() => {setActiveScreen('wallet'); setIsSidebarOpen(false)}} class="flex items-center gap-4 p-4 rounded-xl hover:bg-gray-50 cursor-pointer">
                                            <Icon name="wallet" size={20} className="text-gray-400" />
                                            <span class="text-sm font-bold text-gray-600">আমার ওয়ালেট</span>
                                        </div>
                                    </nav>
                                    <button class="bg-red-50 text-red-500 font-black text-xs py-4 rounded-2xl">লগ-আউট</button>
                                </motion.div>
                            </>
                        )}
                    </AnimatePresence>

                    {/* Content Section */}
                    <main class="flex-1 overflow-y-auto no-scrollbar">
                        {renderScreen()}
                    </main>

                    {/* Bottom Navigation */}
                    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-100 flex justify-around items-center py-2 z-50 h-16 shadow-lg">
                        <NavTab active={activeScreen === 'home'} onClick={() => setActiveScreen('home')} icon="home" label="হোম" />
                        <NavTab active={activeScreen === 'products'} onClick={() => setActiveScreen('products')} icon="layout-grid" label="প্রোডাক্ট" />
                        <NavTab active={activeScreen === 'wallet'} onClick={() => setActiveScreen('wallet')} icon="trending-up" label="প্রফিট" />
                        <NavTab active={activeScreen === 'profile'} onClick={() => setActiveScreen('profile')} icon="user" label="প্রোফাইল" />
                    </nav>
                </div>
            );
        }

        // --- Components ---

        const NavTab = ({ active, icon, label, onClick }) => (
            <button onClick={onClick} class={`flex flex-col items-center gap-1 transition-all ${active ? 'text-[#00a859]' : 'text-gray-400'}`}>
                <Icon name={icon} size={22} className={active ? "scale-110" : ""} />
                <span class={`text-[9px] ${active ? 'font-black' : 'font-bold'}`}>{label}</span>
            </button>
        );

        const GridItem = ({ icon, label, color, onClick }) => (
            <div onClick={onClick} class="flex flex-col items-center gap-2 cursor-pointer active:scale-90 transition-transform">
                <div class="w-[64px] h-[64px] bg-white rounded-2xl shadow-sm border border-gray-100 flex items-center justify-center">
                    <Icon name={icon} size={28} className={color} />
                </div>
                <span class="text-[9px] font-bold text-gray-700 text-center leading-[1.2] max-w-[70px] uppercase tracking-tight">{label}</span>
            </div>
        );

        // --- Screens ---

        function HomeScreen({ onNavigate }) {
            return (
                <div class="space-y-4">
                    <section class="p-4">
                        <div class="bg-[#00a859] rounded-2xl p-6 text-white text-center shadow-lg relative overflow-hidden">
                            <h2 class="text-2xl font-black italic tracking-tighter mb-1 leading-none uppercase">RESELLPONNO</h2>
                            <p class="text-[9px] font-bold opacity-80 uppercase tracking-widest">এক অ্যাপেই সব কিছু এক জায়গায়</p>
                            <div class="absolute -right-10 -bottom-10 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
                        </div>
                    </section>

                    <section class="p-4 grid grid-cols-4 gap-y-6 gap-x-2 pb-10">
                        <GridItem onClick={() => onNavigate('coming-soon')} icon="rocket" label="রিসেলিং প্রজেক্ট" color="text-blue-600" />
                        <GridItem onClick={() => onNavigate('coming-soon')} icon="search" label="প্রোডাক্ট সার্চ" color="text-green-600" />
                        <GridItem onClick={() => onNavigate('coming-soon')} icon="shield-check" label="রিসেলিং প্রো" color="text-teal-500" />
                        <GridItem onClick={() => onNavigate('coming-soon')} icon="shopping-cart" label="ই-কমার্স" color="text-orange-500" />
                        
                        <GridItem onClick={() => onNavigate('coming-soon')} icon="bar-chart-3" label="পেন্ডিং রেভিনিউ" color="text-indigo-600" />
                        <GridItem onClick={() => onNavigate('products')} icon="star" label="ভেরিফাইড প্রোডাক্ট" color="text-yellow-500" />
                        <GridItem onClick={() => onNavigate('coming-soon')} icon="phone" label="মোবাইল রিচার্জ" color="text-blue-500" />
                        <GridItem onClick={() => onNavigate('refer')} icon="users" label="লিডারশিপ" color="text-emerald-500" />
                        
                        <GridItem onClick={() => onNavigate('coming-soon')} icon="help-circle" label="সাপোর্ট" color="text-pink-500" />
                        <GridItem onClick={() => onNavigate('coming-soon')} icon="trending-up" label="রেফার রিপোর্ট" color="text-rose-500" />
                        <GridItem onClick={() => onNavigate('wallet')} icon="wallet" label="নতুন প্রফিট" color="text-green-600" />
                        <GridItem onClick={() => onNavigate('wallet')} icon="layout-grid" label="ওয়ালেট" color="text-blue-500" />
                        
                        <GridItem onClick={() => onNavigate('coming-soon')} icon="heart" label="ফেভারিট প্রডাক্ট" color="text-red-500" />
                        <GridItem onClick={() => onNavigate('coming-soon')} icon="list" label="অর্ডার লিস্ট" color="text-indigo-600" />
                        <GridItem onClick={() => onNavigate('wallet')} icon="share-2" label="উত্তোলন" color="text-orange-600" />
                        <GridItem onClick={() => onNavigate('wallet')} icon="plus-circle" label="ব্যালেন্স এড" color="text-gray-500" />
                    </section>
                </div>
            );
        }

        function WalletScreen({ onBack }) {
            return (
                <div class="p-4 bg-[#f3f4f6] min-h-screen">
                    <button onClick={onBack} class="mb-4 flex items-center gap-2 text-gray-500 font-bold uppercase text-xs">
                        <Icon name="arrow-left" size={20} /> ফিরে যান
                    </button>
                    <div class="bg-gradient-to-br from-[#1e40af] to-[#3b82f6] rounded-3xl p-10 text-white text-center shadow-xl mb-6">
                        <p class="text-[10px] opacity-70 mb-2 font-black uppercase tracking-widest leading-none">বর্তমান ব্যালেন্স</p>
                        <h3 class="text-3xl font-black font-mono">৳ ০.০০</h3>
                    </div>
                </div>
            );
        }

        function ProductsScreen({ onBack }) {
            return (
                <div class="p-4 min-h-screen">
                    <button onClick={onBack} class="mb-4 flex items-center gap-2 text-gray-500 font-bold uppercase text-xs">
                        <Icon name="arrow-left" size={20} /> ফিরে যান
                    </button>
                    <h2 class="text-xs font-black text-[#00a859] mb-4 uppercase tracking-widest">ভেরিফাইড প্রোডাক্ট</h2>
                    <div class="grid grid-cols-2 gap-3">
                        {[1,2,3,4,5,6].map(i => (
                            <div key={i} class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 flex flex-col">
                                <div class="aspect-square bg-gray-100 flex items-center justify-center">
                                    <Icon name="image" size={40} className="text-gray-300" />
                                </div>
                                <div class="p-3">
                                    <h4 class="text-[10px] font-bold text-gray-700 leading-tight mb-2 truncate">নতুন কালেকশন ড্রেস</h4>
                                    <button class="w-full bg-[#00a859] text-white text-[10px] font-black py-2 rounded-xl">মূল্য: ৪৫০ টাকা</button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function ReferralScreen({ onBack }) {
            return (
                <div class="p-4 min-h-screen bg-[#f3f4f6]">
                    <button onClick={onBack} class="mb-4 flex items-center gap-2 text-gray-500 font-bold uppercase text-xs">
                        <Icon name="arrow-left" size={20} /> ফিরে যান
                    </button>
                    <div class="bg-white border-b-4 border-[#00a859] rounded-2xl p-8 text-center shadow-md">
                        <p class="text-[10px] font-bold text-gray-400 uppercase mb-4 tracking-widest">আপনার পার্সোনাল রেফারাল কোড</p>
                        <div class="bg-gray-50 p-5 rounded-2xl mb-6 border border-gray-100 italic">
                            <span class="text-2xl font-black text-[#00a859]">RPB100</span>
                        </div>
                        <button class="w-full bg-[#00a859] text-white font-black py-4 rounded-2xl text-xs uppercase tracking-widest">কপি করুন</button>
                    </div>
                </div>
            );
        }

        function ProfileScreen({ onBack }) {
            return (
                <div class="p-4 flex flex-col items-center min-h-screen">
                    <div class="w-24 h-24 bg-gray-100 rounded-full mb-4 border-4 border-white shadow-lg flex items-center justify-center">
                        <Icon name="user" size={48} className="text-gray-300" />
                    </div>
                    <h3 class="font-black text-xl text-gray-800 uppercase">Md Zahid Hasan</h3>
                    <p class="text-gray-400 text-sm font-bold mb-6">RPB100</p>
                    <div class="w-full space-y-2">
                        <ProfileRow icon="user" label="ব্যক্তিগত তথ্য" />
                        <ProfileRow icon="settings" label="সেটিংস" />
                        <ProfileRow icon="log-out" label="লগ আউট" />
                    </div>
                </div>
            );
        }

        const ProfileRow = ({ icon, label }) => (
            <div class="flex items-center justify-between p-4 bg-white rounded-xl shadow-sm border border-gray-50">
                <div class="flex items-center gap-3">
                    <Icon name={icon} size={20} className="text-gray-400" />
                    <span class="text-xs font-bold text-gray-600">{label}</span>
                </div>
                <Icon name="chevron-right" size={16} className="text-gray-200" />
            </div>
        );

        function ComingSoonScreen({ onBack }) {
            return (
                <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
                    <Icon name="rocket" size={48} className="text-[#00a859] mb-4 animate-bounce" />
                    <h2 class="text-2xl font-black text-gray-800">শীঘ্রই আসছে!</h2>
                    <p class="text-xs text-gray-400 mt-2">এই ফিচারটি আমাদের পরবর্তী আপডেটে যুক্ত করা হবে।</p>
                    <button onClick={onBack} class="mt-8 bg-[#00a859] text-white font-black text-xs px-10 py-3 rounded-full">ফিরে যান</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
